<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculadora de Transição Tributária [BRUTALISM]</title>
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
      rel="stylesheet"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&family=Roboto:wght@400;500;700&display=swap"
      rel="stylesheet"
    />

    <style>
      :root {
        --bg-app: #f2f2f0;
        --bg-surface: #fafafa;
        --bg-panel: #fafafa;
        --bg-sidebar: #fafafa;
        --bg-input: #f0f2f5;
        --bg-hover: #fcfcfd;
        --bg-tooltip: #1e2130;
        --text-primary: #1e2130;
        --text-secondary: #5e6c84;
        --text-tertiary: #8f9bb3;
        --border-subtle: #edf1f7;
        --border-focus: #887cfd;
        --border-dashed: #3f3f46;
        --accent-primary: #5347ce;
        --accent-glow: rgba(83, 71, 206, 0.2);
        --data-purple: #5347ce;
        --data-green: #16c8c7;
        --data-blue: #4896fe;
        --data-orange: #ffab00;
        --data-red: #ff5630;
        --badge-purple-bg: rgba(83, 71, 206, 0.12);
        --badge-blue-bg: rgba(72, 150, 254, 0.12);
        --radius-sm: 8px;
        --radius-md: 16px;
        --shadow-card: 0px 4px 20px rgba(0, 0, 0, 0.05);
        --shadow-float: 0px 8px 30px rgba(0, 0, 0, 0.12);
        --font-ui: "Inter", sans-serif;
      }

      [data-theme="dark"] {
        --bg-app: #0f111a;
        --bg-surface: #1e2130;
        --bg-panel: #1e2130;
        --bg-sidebar: #151725;
        --bg-input: #151725;
        --bg-hover: #2a2e42;
        --bg-tooltip: #2a2e42;
        --text-primary: #ffffff;
        --text-secondary: #a0aec0;
        --text-tertiary: #718096;
        --border-subtle: #2d3748;
        --border-dashed: #4a5568;
        --accent-primary: #887cfd;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        outline: none;
      }
      body {
        font-family: var(--font-ui);
        background-color: var(--bg-app);
        color: var(--text-primary);
        height: 100vh;
        overflow: hidden;
        display: flex;
        font-size: 13px;
        transition:
          background 0.3s,
          color 0.3s;
      }

      /* Sidebar */
      .sidebar {
        width: 60px;
        position: fixed;
        left: 0;
        top: 0;
        bottom: 0;
        background: var(--bg-sidebar);
        padding: 2rem 0.5rem;
        display: flex;
        flex-direction: column;
        z-index: 2000;
        transition: width 0.3s ease;
        box-shadow: 1px 0 0 var(--border-subtle);
        overflow: hidden;
        white-space: nowrap;
      }
      .sidebar:hover {
        width: 240px;
        padding: 2rem 1.2rem;
      }
      .sidebar span {
        opacity: 0;
        visibility: hidden;
        transition: opacity 0.2s;
      }
      .sidebar:hover span {
        opacity: 1;
        visibility: visible;
      }

      .logo {
        font-size: 16px;
        font-weight: 700;
        margin-bottom: 3rem;
        display: flex;
        align-items: center;
        gap: 12px;
        text-decoration: none;
        color: var(--text-primary);
      }
      .logo i {
        color: var(--data-purple);
        font-size: 20px;
        background: var(--badge-purple-bg);
        padding: 8px;
        border-radius: 8px;
      }

      .nav-item {
        background: transparent;
        color: var(--text-secondary);
        padding: 0.8rem 0.6rem;
        margin-bottom: 0.4rem;
        font-weight: 600;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 12px;
        transition: all 0.2s;
        text-decoration: none;
      }
      .nav-item:hover {
        background: var(--bg-hover);
        color: var(--data-purple);
      }
      .nav-item.active {
        background: var(--badge-purple-bg);
        color: var(--data-purple);
      }

      /* Main Content */
      .main-content {
        margin-left: 60px;
        flex: 1;
        display: flex;
        flex-direction: column;
        height: 100vh;
        overflow: hidden;
        background: var(--bg-app);
      }
      .scroll-content {
        flex: 1;
        overflow-y: auto;
        padding: 2rem 3rem;
        padding-bottom: 100px;
      }

      .neo-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 1.5rem;
      }
      .neo-header h1 {
        font-size: 32px;
        font-weight: 600;
        letter-spacing: -0.01em;
      }

      /* Cards / Config Box */
      .config-box {
        background: var(--bg-surface);
        border: 2px solid var(--data-purple);
        border-radius: var(--radius-md);
        padding: 2rem;
        margin-bottom: 1.5rem;
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 20px;
        box-shadow: 0 10px 40px rgba(83, 71, 206, 0.1);
      }

      .form-group {
        position: relative;
      }
      .form-group label {
        display: block;
        font-weight: 700;
        margin-bottom: 10px;
        font-size: 11px;
        color: var(--data-purple);
        text-transform: uppercase;
      }
      .neo-input {
        width: 100%;
        padding: 12px 16px;
        border: 1px solid var(--border-subtle);
        border-radius: 12px;
        background: var(--bg-input);
        color: var(--text-primary);
        font-size: 14px;
        font-weight: 600;
        transition: all 0.2s;
      }
      .neo-input:focus {
        border-color: var(--data-purple);
        background: var(--bg-surface);
        box-shadow: 0 0 0 4px var(--accent-glow);
      }

      .neo-btn {
        background: var(--data-purple);
        color: #fff;
        border: none;
        padding: 16px 24px;
        border-radius: 12px;
        font-weight: 700;
        font-size: 14px;
        cursor: pointer;
        transition: all 0.3s;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        width: 100%;
        margin-top: 10px;
      }
      .neo-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 25px rgba(83, 71, 206, 0.4);
      }
      .neo-btn:active {
        transform: scale(0.98);
      }

      /* Results Table */
      .table-container {
        background: var(--bg-surface);
        border-radius: var(--radius-md);
        box-shadow: var(--shadow-card);
        overflow: hidden;
      }
      table {
        width: 100%;
        border-collapse: collapse;
      }
      th {
        background: var(--bg-surface);
        color: var(--text-secondary);
        padding: 16px;
        text-align: left;
        font-size: 11px;
        font-weight: 700;
        text-transform: uppercase;
        border-bottom: 1px solid var(--border-subtle);
      }
      td {
        padding: 14px 16px;
        border-bottom: 1px solid var(--border-subtle);
        font-size: 13px;
        color: var(--text-primary);
      }
      tr:last-child td {
        border-bottom: none;
      }
      tr:hover td {
        background-color: var(--bg-hover);
      }

      .total-col {
        background-color: var(--badge-purple-bg);
        font-weight: 700;
        color: var(--data-purple);
      }

      .theme-btn {
        background: transparent;
        border: 1px solid var(--data-purple);
        color: var(--data-purple);
        padding: 6px 15px;
        border-radius: 8px;
        font-weight: 600;
        cursor: pointer;
        transition: 0.2s;
      }
      .theme-btn:hover {
        background: var(--data-purple);
        color: #fff;
      }
    </style>
  </head>
  <body>
    <aside class="sidebar">
      <a href="#" class="logo">
        <i class="fa-solid fa-scale-balanced"></i>
        <div class="logo-text">
          <span>TAX REFORM</span>
        </div>
      </a>
      <nav>
        <a href="#" class="nav-item active">
          <i class="fas fa-calculator"></i> <span>Transição</span>
        </a>
        <div class="nav-item" onclick="location.reload()">
          <i class="fas fa-sync"></i> <span>Limpar</span>
        </div>
      </nav>
    </aside>

    <main class="main-content">
      <div class="scroll-content">
        <header class="neo-header">
          <h1>Calculadora Transição ⚖️</h1>
          <div style="display: flex; gap: 15px; align-items: center">
            <span style="color: var(--text-tertiary); font-size: 11px"
              >Simulação Efetiva (2027-2033)</span
            >
            <button class="theme-btn" onclick="toggleTheme()">Lux Theme</button>
          </div>
        </header>

        <section class="config-box">
          <div class="form-group">
            <label>Padrão IBS (%)</label>
            <input
              type="number"
              id="aliquotaIBS"
              class="neo-input"
              placeholder="Ex: 18.50"
              step="0.01"
            />
          </div>
          <div class="form-group">
            <label>Padrão CBS (%)</label>
            <input
              type="number"
              id="aliquotaCBS"
              class="neo-input"
              placeholder="Ex: 8.50"
              step="0.01"
            />
          </div>
          <div class="form-group">
            <label>Atual ISS (%)</label>
            <input
              type="number"
              id="aliquotaISS"
              class="neo-input"
              placeholder="Ex: 5.00"
              step="0.01"
            />
          </div>
          <div class="form-group">
            <label>Atual ICMS (%)</label>
            <input
              type="number"
              id="aliquotaICMS"
              class="neo-input"
              placeholder="Ex: 18.00"
              step="0.01"
            />
          </div>
          <div class="form-group">
            <label>Redução IBS/CBS (%)</label>
            <input
              type="number"
              id="percentualReducao"
              class="neo-input"
              placeholder="Ex: 60"
              step="0.01"
              value="0"
            />
          </div>
          <div style="grid-column: 1 / -1">
            <button id="calcularBtn" class="neo-btn">
              <i class="fa-solid fa-bolt"></i> CALCULAR IMPACTO DA TRANSIÇÃO
            </button>
          </div>
        </section>

        <div class="table-container">
          <table>
            <thead>
              <tr>
                <th>Ano</th>
                <th>CBS (Novo)</th>
                <th>IBS (Novo)</th>
                <th>ISS (Antigo)</th>
                <th>ICMS (Antigo)</th>
                <th class="total-col">TOTAL (%)</th>
              </tr>
            </thead>
            <tbody id="tabelaResultados"></tbody>
          </table>
        </div>
      </div>
    </main>

    <script>
      function toggleTheme() {
        document.body.dataset.theme =
          document.body.dataset.theme === "dark" ? "light" : "dark";
      }
      const ANOS_TRANSICAO = [2027, 2028, 2029, 2030, 2031, 2032, 2033];
      const ESCALA_IBS = {
        2029: 0.1,
        2030: 0.2,
        2031: 0.3,
        2032: 0.4,
        2033: 1.0,
      };
      const ESCALA_ANTIGOS = {
        2027: 1.0,
        2028: 1.0,
        2029: 0.9,
        2030: 0.8,
        2031: 0.7,
        2032: 0.6,
        2033: 0.0,
      };

      function formatPercent(value) {
        return value.toFixed(2).replace(".", ",") + "%";
      }

      function calcular() {
        const iIBS = document.getElementById("aliquotaIBS").value;
        const iCBS = document.getElementById("aliquotaCBS").value;
        const iISS = document.getElementById("aliquotaISS").value;
        const iICMS = document.getElementById("aliquotaICMS").value;
        const iRed = document.getElementById("percentualReducao").value;

        if (!iIBS || !iCBS || !iISS || !iICMS || !iRed) {
          alert("Por favor, preencha todas as alíquotas para calcular.");
          return;
        }

        const aliqIBS_Base = parseFloat(iIBS);
        const aliqCBS_Base = parseFloat(iCBS);
        const aliqISS_Base = parseFloat(iISS);
        const aliqICMS_Base = parseFloat(iICMS);
        const percReducao = parseFloat(iRed) / 100;

        const tbody = document.getElementById("tabelaResultados");
        tbody.innerHTML = "";

        const ibsAlvoReduzido = aliqIBS_Base * (1 - percReducao);
        const cbsAlvoReduzido = aliqCBS_Base * (1 - percReducao);

        ANOS_TRANSICAO.forEach((ano) => {
          let valCBS = cbsAlvoReduzido;
          let valIBS =
            ano === 2027 || ano === 2028
              ? 0.05 * (1 - percReducao)
              : ibsAlvoReduzido * (ESCALA_IBS[ano] || 0);

          const fatorAntigos = ESCALA_ANTIGOS[ano];
          let valISS = aliqISS_Base * fatorAntigos;
          let valICMS = aliqICMS_Base * fatorAntigos;
          let total = valCBS + valIBS + valISS + valICMS;

          const tr = document.createElement("tr");
          tr.innerHTML = `
                <td><strong>${ano}</strong></td>
                <td>${formatPercent(valCBS)}</td>
                <td>${formatPercent(valIBS)}</td>
                <td>${formatPercent(valISS)}</td>
                <td>${formatPercent(valICMS)}</td>
                <td class="total-col">${formatPercent(total)}</td>
            `;
          tbody.appendChild(tr);
        });
      }

      document
        .getElementById("calcularBtn")
        .addEventListener("click", calcular);
    </script>
  </body>
</html>
